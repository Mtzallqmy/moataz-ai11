name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Node 20, PostgreSQL, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moataz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d moataz_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/moataz_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/moataz_test
      DATABASE_SSL_MODE: disable
      DATABASE_POOL_MAX: "5"
      DATABASE_IDLE_TIMEOUT_MS: "10000"
      DATABASE_CONNECTION_TIMEOUT_MS: "5000"
      DATABASE_STATEMENT_TIMEOUT_MS: "10000"
      DATABASE_STARTUP_RETRIES: "3"
      DATABASE_MIGRATIONS_ON_STARTUP: "true"
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
      ENCRYPTION_KEY: ci-encryption-key-at-least-32-characters-long
      DEFAULT_ADMIN_EMAIL: admin@example.com
      DEFAULT_ADMIN_PASSWORD: IntegrationPassword123!
      APP_URL: http://localhost:8080
      CORS_ORIGIN: http://localhost:8080
      TRUST_PROXY: "1"
      WORKSPACE_DIR: ./workspace/ci
      ALLOW_SHELL: "false"
      SHELL_SANDBOX_MODE: disabled
      TELEGRAM_POLLING: "false"
      ALLOW_PRIVATE_PROVIDER_URLS: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Reject non-public package registries
        shell: bash
        run: |
          set -euo pipefail
          if grep -R "applied-caas-gateway\|artifactory/api/npm" package-lock.json; then
            echo "package-lock.json contains a private/internal registry URL"
            exit 1
          fi

      - name: Install dependencies
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: npm ci --include=dev --no-audit --no-fund

      - name: Reset PostgreSQL schema
        shell: bash
        run: |
          set -euo pipefail
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d moataz_test -v ON_ERROR_STOP=1 <<'SQL'
          DROP SCHEMA IF EXISTS drizzle CASCADE;
          DROP SCHEMA public CASCADE;
          CREATE SCHEMA public;
          GRANT ALL ON SCHEMA public TO postgres;
          GRANT ALL ON SCHEMA public TO public;
          SQL

      - name: Apply and verify Drizzle migrations
        run: |
          npm run db:migrate
          npm run db:check
          npm run db:migrate
          npm run db:check

      - name: Lint
        run: npm run lint

      - name: Strict TypeScript
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: PostgreSQL integration tests
        run: npm run test:integration

      - name: Production build
        run: npm run build

  docker:
    name: Docker production image
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build --progress=plain --tag moataz-ai:ci .

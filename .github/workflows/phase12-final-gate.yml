name: Phase 1-2 final validation gate

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  validate-and-merge:
    if: github.head_ref == 'feat/providers-drizzle-phase12'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moataz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d moataz_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      GH_TOKEN: ${{ github.token }}
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/moataz_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/moataz_test
      DATABASE_SSL_MODE: disable
      DATABASE_POOL_MAX: "5"
      DATABASE_IDLE_TIMEOUT_MS: "10000"
      DATABASE_CONNECTION_TIMEOUT_MS: "5000"
      DATABASE_STATEMENT_TIMEOUT_MS: "10000"
      DATABASE_STARTUP_RETRIES: "3"
      DATABASE_MIGRATIONS_ON_STARTUP: "true"
      JWT_SECRET: final-gate-jwt-secret-at-least-32-characters
      ENCRYPTION_KEY: final-gate-encryption-key-at-least-32-characters
      DEFAULT_ADMIN_EMAIL: admin@example.com
      DEFAULT_ADMIN_PASSWORD: FinalGatePassword123!
      APP_URL: http://localhost:8080
      CORS_ORIGIN: http://localhost:8080
      TRUST_PROXY: "1"
      WORKSPACE_DIR: ./workspace/final-gate
      ALLOW_SHELL: "false"
      SHELL_SANDBOX_MODE: disabled
      TELEGRAM_POLLING: "false"
      ALLOW_PRIVATE_PROVIDER_URLS: "false"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Clean temporary implementation artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .audit .bootstrap
          find .github/workflows -maxdepth 1 -type f ! -name ci.yml ! -name phase12-final-gate.yml -delete
          test ! -e server/src/db.ts
          test ! -d server/src/migrations
          test ! -e server/src/routes/providers.phase12.ts
          if grep -R "better-sqlite3\|file:.*\.db\|from './db\.js'\|from '../db\.js'" package.json package-lock.json server client Dockerfile --include='*.ts' --include='*.tsx' --include='*.json' --include='Dockerfile'; then
            echo 'Legacy SQLite or raw DB compatibility references remain.'
            exit 1
          fi

      - name: Install dependencies with Node.js 20
        run: npm ci --include=dev --no-audit --no-fund

      - name: Reset PostgreSQL test schema
        shell: bash
        run: |
          set -euo pipefail
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d moataz_test -v ON_ERROR_STOP=1 <<'SQL'
          DROP SCHEMA IF EXISTS drizzle CASCADE;
          DROP SCHEMA public CASCADE;
          CREATE SCHEMA public;
          GRANT ALL ON SCHEMA public TO postgres;
          GRANT ALL ON SCHEMA public TO public;
          SQL

      - name: Apply and verify Drizzle migrations
        run: |
          npm run db:migrate
          npm run db:check
          npm run db:migrate
          npm run db:check

      - name: Lint
        run: npm run lint

      - name: Strict TypeScript
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: PostgreSQL integration tests
        run: npm run test:integration

      - name: Frontend and backend production build
        run: npm run build

      - name: Docker production image
        run: docker build --progress=plain --tag moataz-ai:phase12 .

      - name: Write verified validation report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs
          cat > docs/PHASE12_VALIDATION.md <<EOF
          # Phase 1-2 Validation

          Validated on GitHub Actions with Node.js 20 and PostgreSQL 16 at commit \`${GITHUB_SHA}\`.

          | Check | Result |
          |---|---|
          | npm ci --include=dev | Passed |
          | npm run db:migrate on empty PostgreSQL | Passed |
          | repeated npm run db:migrate | Passed |
          | npm run db:check | Passed |
          | npm run lint | Passed |
          | npm run typecheck with strict library checking | Passed |
          | npm test | Passed |
          | npm run test:integration | Passed |
          | npm run build | Passed |
          | docker build | Passed |

          No live AI-provider request is used by the test suite; provider behavior is validated with local mock HTTP servers. Only the provider-system and PostgreSQL/Drizzle phases are included.
          EOF
          rm -f .github/workflows/phase12-final-gate.yml

      - name: Commit final cleanup and validation evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: record successful phase 1-2 production validation'
          git push origin HEAD:${{ github.head_ref }}

      - name: Mark pull request ready
        run: gh pr ready 14 --repo ${{ github.repository }} || true

      - name: Wait for clean branch CI
        shell: bash
        run: |
          set -euo pipefail
          sleep 10
          gh pr checks 14 --repo ${{ github.repository }} --watch --fail-fast

      - name: Merge validated phases 1-2
        run: >-
          gh pr merge 14 --repo ${{ github.repository }} --squash --delete-branch
          --subject "feat: production provider registry and PostgreSQL Drizzle persistence"
          --body "Validated provider-system and PostgreSQL/Drizzle phases only. Includes strict TypeScript, PostgreSQL migrations, unit and integration tests, production build, and Docker build."

name: Remove unused provider SDK dependencies
on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened, ready_for_review]
permissions:
  contents: write
jobs:
  cleanup:
    if: github.head_ref == 'feat/providers-drizzle-phase12'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - shell: bash
        run: |
          set -euo pipefail
          npm ci --include=dev --no-audit --no-fund
          if ! grep -R "from ['\"]openai['\"]\|require(['\"]openai['\"]" server client --include='*.ts' --include='*.tsx'; then
            npm uninstall openai
          fi
          if ! grep -R "@google/generative-ai" server client --include='*.ts' --include='*.tsx'; then
            npm uninstall @google/generative-ai
          fi
          rm -f .github/workflows/remove-unused-provider-sdks.yml
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json .github/workflows/remove-unused-provider-sdks.yml
          git commit -m 'build: remove unused provider SDK dependencies'
          git push origin HEAD:${{ github.head_ref }}

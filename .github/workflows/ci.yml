name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, types, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Reject non-public package registries
        shell: bash
        run: |
          set -euo pipefail
          if grep -R "applied-caas-gateway\|artifactory/api/npm" package-lock.json; then
            echo "package-lock.json contains a private/internal registry URL"
            exit 1
          fi

      - name: Install dependencies including build tools
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: npm ci --include=dev --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee unit-test.log

      - name: Upload unit-test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-test.log
          if-no-files-found: warn
          retention-days: 3

      - name: Integration tests
        run: npm run test:integration

      - name: Production build
        run: npm run build

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        id: docker-build
        shell: bash
        run: |
          set -o pipefail
          docker build --progress=plain --tag moataz-ai:ci . 2>&1 | tee docker-build.log

      - name: Upload Docker build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-log
          path: docker-build.log
          if-no-files-found: error
          retention-days: 3

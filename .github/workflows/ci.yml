name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, types, PostgreSQL tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moataz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d moataz_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/moataz_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/moataz_test
      DATABASE_SSL_MODE: disable
      DATABASE_MIGRATIONS_ON_STARTUP: "true"
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
      ENCRYPTION_KEY: ci-encryption-key-at-least-32-characters
      DEFAULT_ADMIN_EMAIL: admin@example.com
      DEFAULT_ADMIN_PASSWORD: IntegrationPassword123!
      APP_URL: http://localhost:8080
      WORKSPACE_DIR: ./workspace/ci
      ALLOW_SHELL: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Reject non-public package registries
        shell: bash
        run: |
          set -euo pipefail
          if grep -R "applied-caas-gateway\|artifactory/api/npm" package-lock.json; then
            echo "package-lock.json contains a private/internal registry URL"
            exit 1
          fi

      - name: Install dependencies
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: npm ci --include=dev --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee unit-test.log

      - name: Upload unit-test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-test.log
          if-no-files-found: warn
          retention-days: 3

      - name: Reset PostgreSQL and run migrations
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d moataz_test -v ON_ERROR_STOP=1 <<'SQL'
          DROP SCHEMA IF EXISTS drizzle CASCADE;
          DROP SCHEMA public CASCADE;
          CREATE SCHEMA public;
          GRANT ALL ON SCHEMA public TO postgres;
          GRANT ALL ON SCHEMA public TO public;
          SQL
          npm run db:migrate
          npm run db:check

      - name: Integration tests
        run: npm run test:integration

      - name: Production build
        run: npm run build

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        id: docker-build
        shell: bash
        run: |
          set -o pipefail
          docker build --progress=plain --tag moataz-ai:ci . 2>&1 | tee docker-build.log

      - name: Upload Docker build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-log
          path: docker-build.log
          if-no-files-found: error
          retention-days: 3

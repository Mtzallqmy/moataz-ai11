name: Apply production provider and UX source

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Validate and apply reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/production-ux.chunk-* > /tmp/production-ux.patch
          git apply --check --exclude=server/src/index.ts /tmp/production-ux.patch
          git apply --exclude=server/src/index.ts /tmp/production-ux.patch
          rm -rf .bootstrap
          git rm .github/workflows/apply-production-ux.yml

      - name: Commit reviewed source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: harden providers integrations chats and responsive UX'
          git push origin HEAD:${{ github.head_ref }}

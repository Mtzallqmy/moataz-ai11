name: Apply production provider and UX source

on:
  push:
    branches: [feat/production-provider-ux]
    paths:
      - '.bootstrap/production-ux.tar.gz.b64'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/production-provider-ux
          fetch-depth: 0

      - name: Verify and extract reviewed source
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .bootstrap/production-ux.tar.gz.b64 > /tmp/production-ux.tar.gz
          echo 'b5ea9b8f1162862003a6c328422f511e94fab3c64231502a922fff59bd492db0  /tmp/production-ux.tar.gz' | sha256sum --check --strict
          if tar -tzf /tmp/production-ux.tar.gz | grep -E '(^/|(^|/)\.\.(/|$))'; then
            echo 'Unsafe archive path detected'
            exit 1
          fi
          tar -xzf /tmp/production-ux.tar.gz -C .
          rm -rf .bootstrap

      - name: Commit reviewed source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: harden providers integrations chats and responsive UX'
          git push origin HEAD:feat/production-provider-ux

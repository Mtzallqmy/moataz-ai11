name: Apply v1.4 source transformations

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/telegram-console-provider-diagnostics-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply reviewed transformations
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .bootstrap/v3/apply.py ]; then
            echo 'Transformations already applied.'
            exit 0
          fi
          python3 .bootstrap/v3/apply.py
          rm -rf .bootstrap
          rm -f .github/workflows/apply-v1.4.yml

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add Telegram console and provider diagnostics v1.4'
          git push origin HEAD:${{ github.head_ref }}

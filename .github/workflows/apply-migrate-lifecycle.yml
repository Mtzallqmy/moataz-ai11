name: Apply tracked Drizzle migration lifecycle
on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened, ready_for_review]
permissions:
  contents: write
jobs:
  apply:
    if: github.head_ref == 'feat/providers-drizzle-phase12'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - run: |
          set -euo pipefail
          if [ -f server/src/database/migrate.phase12.ts ]; then
            mv server/src/database/migrate.phase12.ts server/src/database/migrate.ts
          fi
          rm -f .github/workflows/apply-migrate-lifecycle.yml
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor: apply tracked Drizzle migration lifecycle'
          git push origin HEAD:${{ github.head_ref }}

name: Add production database scripts
on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened, ready_for_review]
permissions:
  contents: write
jobs:
  apply:
    if: github.head_ref == 'feat/providers-drizzle-phase12'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          scripts = package.setdefault('scripts', {})
          scripts['db:migrate:prod'] = 'node dist/server/db-cli.js migrate'
          scripts['db:check:prod'] = 'node dist/server/db-cli.js check'
          scripts['db:seed:prod'] = 'node dist/server/db-cli.js seed'
          package_path.write_text(json.dumps(package, indent=2, ensure_ascii=False) + '\n')

          docs = Path('docs/RAILWAY_SUPABASE_PHASE12.md')
          text = docs.read_text()
          text = text.replace('run `npm run db:migrate` once;', 'run `npm run db:migrate:prod` once from the built production image;')
          text = text.replace('run `npm run db:check`;', 'run `npm run db:check:prod`;')
          if 'db:migrate:prod' not in text:
              text += """

          ## Built-image database commands

          The runtime image excludes TypeScript sources and development dependencies. Use the compiled commands in Railway release/pre-deploy jobs:

          ```bash
          npm run db:migrate:prod
          npm run db:check:prod
          ```

          Development and CI may use `npm run db:migrate` and `npm run db:check`, which execute the TypeScript CLI through `tsx`.
          """
          docs.write_text(text)
          PY
          rm -f .github/workflows/add-production-db-scripts.yml
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --package-lock-only --ignore-scripts
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json docs/RAILWAY_SUPABASE_PHASE12.md .github/workflows/add-production-db-scripts.yml
          git commit -m 'build: add compiled production database commands'
          git push origin HEAD:${{ github.head_ref }}

name: Apply phase 1-2 refactors

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/providers-drizzle-phase12'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply reviewed transformations
        run: |
          set -euo pipefail
          python3 .bootstrap/phase12/refactor_telegram.py
          rm -rf .bootstrap
          rm -f .github/workflows/apply-phase12-refactors.yml
      - name: Commit transformed files
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor: move Telegram persistence to repositories'
          git push origin HEAD:${{ github.head_ref }}

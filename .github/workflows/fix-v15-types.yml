name: Fix v1.5 lint and types

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'fix/provider-session-attachments-v1.5'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply focused corrections
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          attachments = Path('server/src/attachments.ts')
          text = attachments.read_text()
          marker = "function safeName(raw: string): string {"
          helper = """function stripControlCharacters(value: string): string {
            return [...value].filter((character) => {
              const code = character.charCodeAt(0);
              return code >= 32 && code != 127;
            }).join('');
          }

          function safeName(raw: string): string {"""
          text = text.replace(marker, helper, 1)
          text = text.replace("raw.normalize('NFKC').replace(/[\\u0000-\\u001f\\u007f]/g, '').trim()", "stripControlCharacters(raw.normalize('NFKC')).trim()")
          text = text.replace(".toString('utf8').replace(/[\\u0000-\\u001f]/g, '').slice(0, 300)", ".toString('utf8').split('').filter((character) => character.charCodeAt(0) >= 32).join('').slice(0, 300)")
          text = text.replace("return value.replace(/\\u0000/g, '').replace(/\\r\\n/g, '\\n').trim();", "return value.split('').filter((character) => character.charCodeAt(0) !== 0).join('').replace(/\\r\\n/g, '\\n').trim();")
          attachments.write_text(text)

          llm = Path('server/src/llm.ts')
          text = llm.read_text()
          text = text.replace("""  let response: Response;
            try {
              response = await fetch(url, {
                method: init.method,
                headers: openAiHeaders(provider),
                ...(init.body !== undefined ? { body: JSON.stringify(init.body) } : {}),
                signal,
                redirect: 'manual'
              });
            } catch (error) {
              throw error;
            }""", """  const response = await fetch(url, {
              method: init.method,
              headers: openAiHeaders(provider),
              ...(init.body !== undefined ? { body: JSON.stringify(init.body) } : {}),
              signal,
              redirect: 'manual'
            });""")
          old = """      if (message.images?.length) {
                const content: Anthropic.ContentBlockParam[] = [
                  ...message.images.map((image): Anthropic.ImageBlockParam => ({
                    type: 'image',
                    source: { type: 'base64', media_type: image.mimeType as Anthropic.Base64ImageSource['media_type'], data: image.dataBase64 }
                  })),
                  { type: 'text', text: message.content }
                ];
                return { role: 'user', content };
              }"""
          new = """      if (message.images?.length) {
                const content = [
                  ...message.images.map((image) => ({
                    type: 'image' as const,
                    source: {
                      type: 'base64' as const,
                      media_type: image.mimeType as 'image/jpeg' | 'image/png' | 'image/gif' | 'image/webp',
                      data: image.dataBase64
                    }
                  })),
                  { type: 'text' as const, text: message.content }
                ];
                return { role: 'user', content } as Anthropic.MessageParam;
              }"""
          text = text.replace(old, new, 1)
          text = text.replace("/(^|[\\/_-])free($|[\\/_-])/", "/(^|[/_-])free($|[/_-])/")
          old_attempt = """      attempts.push({
                model: candidate,
                status: 'failed',
                ...(error instanceof AppError ? { errorCode: error.code } : {}),
                ...(failureStage(error) ? { errorStage: failureStage(error) } : {})
              });"""
          new_attempt = """      const stage = failureStage(error);
              attempts.push({
                model: candidate,
                status: 'failed',
                ...(error instanceof AppError ? { errorCode: error.code } : {}),
                ...(stage ? { errorStage: stage } : {})
              });"""
          text = text.replace(old_attempt, new_attempt, 1)
          llm.write_text(text)

          routes = Path('server/src/routes.ts')
          text = routes.read_text()
          text = text.replace("const input = parseInput(messageSchema, req.body);\n      const key = idempotencyKey", "const input = parseInput(messageSchema, req.body);\n      const attachmentIds = input.attachmentIds ?? [];\n      const key = idempotencyKey", 1)
          text = text.replace("pendingAttachments(input.attachmentIds, chatId, req.user!.id)", "pendingAttachments(attachmentIds, chatId, req.user!.id)", 1)
          text = text.replace("...input.attachmentIds.map((attachmentId)", "...attachmentIds.map((attachmentId)", 1)
          text = text.replace("          model: chat.model ?? undefined,\n          tools:", "          ...(chat.model ? { model: chat.model } : {}),\n          tools:", 1)
          routes.write_text(text)
          PY
          rm -f .github/workflows/diagnose-v15.yml .github/workflows/fix-v15-types.yml
      - name: Commit corrections
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: resolve v1.5 lint and strict TypeScript diagnostics'
          git push origin HEAD:${{ github.head_ref }}

name: Apply phase 2 dependencies

on:
  push:
    branches: [feat/provider-registry-drizzle-v2]
    paths:
      - '.bootstrap/apply-phase2-deps.txt'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/provider-registry-drizzle-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Apply environment configuration
        run: python3 .bootstrap/config-phase2.py
      - name: Replace SQLite runtime with Drizzle
        env:
          NPM_CONFIG_PRODUCTION: 'false'
        run: |
          npm uninstall better-sqlite3
          npm uninstall --save-dev @types/better-sqlite3
          npm install drizzle-orm
          npm install --save-dev drizzle-kit
          npm pkg set version=1.6.0
          npm pkg set 'scripts.db:generate=drizzle-kit generate'
          npm pkg set 'scripts.db:studio=drizzle-kit studio'
      - name: Commit dependency and configuration changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json server/src/config.ts
          git commit -m 'feat: configure PostgreSQL pools and Drizzle ORM'
          git push origin HEAD:feat/provider-registry-drizzle-v2

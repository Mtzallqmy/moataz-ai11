name: Phase 1-2 failure report

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  report:
    if: github.head_ref == 'feat/providers-drizzle-phase12'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moataz_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d moataz_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/moataz_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/moataz_test
      DATABASE_SSL_MODE: disable
      DATABASE_MIGRATIONS_ON_STARTUP: "true"
      JWT_SECRET: report-jwt-secret-at-least-32-characters-long
      ENCRYPTION_KEY: report-encryption-key-at-least-32-characters-long
      DEFAULT_ADMIN_EMAIL: admin@example.com
      DEFAULT_ADMIN_PASSWORD: ReportPassword123!
      APP_URL: http://localhost:8080
      CORS_ORIGIN: http://localhost:8080
      TRUST_PROXY: "1"
      ALLOW_SHELL: "false"
      SHELL_SANDBOX_MODE: disabled
      TELEGRAM_POLLING: "false"
      WORKSPACE_DIR: ./workspace/report
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=dev --no-audit --no-fund
      - shell: bash
        run: |
          set +e
          mkdir -p .audit/final
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d moataz_test -v ON_ERROR_STOP=1 -c 'DROP SCHEMA IF EXISTS drizzle CASCADE; DROP SCHEMA public CASCADE; CREATE SCHEMA public; GRANT ALL ON SCHEMA public TO postgres; GRANT ALL ON SCHEMA public TO public;' > .audit/final/postgres-reset.log 2>&1
          npm run db:migrate > .audit/final/db-migrate.log 2>&1; migrate=$?
          npm run db:check > .audit/final/db-check.log 2>&1; dbcheck=$?
          npm run lint > .audit/final/lint.log 2>&1; lint=$?
          npm run typecheck > .audit/final/typecheck.log 2>&1; typecheck=$?
          npm test > .audit/final/unit.log 2>&1; unit=$?
          npm run test:integration > .audit/final/integration.log 2>&1; integration=$?
          npm run build > .audit/final/build.log 2>&1; build=$?
          printf 'migrate=%s\ndbcheck=%s\nlint=%s\ntypecheck=%s\nunit=%s\nintegration=%s\nbuild=%s\n' "$migrate" "$dbcheck" "$lint" "$typecheck" "$unit" "$integration" "$build" > .audit/final/status.txt
          python3 - <<'PY'
          from pathlib import Path
          for path in Path('.audit/final').glob('*.log'):
              text = path.read_text(errors='replace')
              lines = text.splitlines()
              if len(lines) > 500:
                  lines = lines[:250] + ['... output truncated ...'] + lines[-250:]
              path.write_text('\n'.join(lines) + '\n')
          PY
          rm -f .github/workflows/phase12-failure-report.yml
          exit 0
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .audit/final .github/workflows/phase12-failure-report.yml
          git commit -m 'chore: capture final phase 1-2 validation diagnostics'
          git push origin HEAD:${{ github.head_ref }}

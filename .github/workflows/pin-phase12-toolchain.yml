name: Pin phase 1-2 toolchain
on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened, ready_for_review]
permissions:
  contents: write
jobs:
  pin:
    if: github.head_ref == 'feat/providers-drizzle-phase12'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: |
          set -euo pipefail
          npm install drizzle-orm@0.36.4
          npm install --save-dev drizzle-kit@0.28.1 typescript@5.5.4 mysql2@3.11.5
          npm uninstall better-sqlite3 @types/better-sqlite3 || true
          npm pkg set version=2.0.0
          npm pkg set scripts.db:generate='drizzle-kit generate'
          npm pkg set scripts.db:migrate='tsx server/src/db-cli.ts migrate'
          npm pkg set scripts.db:check='tsx server/src/db-cli.ts check'
          npm pkg set scripts.db:studio='drizzle-kit studio'
          npm pkg set scripts.db:seed='tsx server/src/db-cli.ts seed'
          rm -f .github/workflows/pin-phase12-toolchain.yml
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json .github/workflows/pin-phase12-toolchain.yml
          git commit -m 'build: pin strict TypeScript and Drizzle toolchain'
          git push origin HEAD:${{ github.head_ref }}

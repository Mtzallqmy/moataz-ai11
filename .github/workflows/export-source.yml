name: Export review source

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Package source
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=node_modules --exclude=dist --exclude=.bootstrap -czf /tmp/moataz-source.tar.gz .
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: moataz-source
          path: /tmp/moataz-source.tar.gz
          if-no-files-found: error
          retention-days: 1

name: Export phase source

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'feat/providers-drizzle-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Package source
        run: |
          tar --exclude=.git -czf "$RUNNER_TEMP/moataz-ai11-source.tgz" .
      - uses: actions/upload-artifact@v4
        with:
          name: moataz-ai11-source
          path: ${{ runner.temp }}/moataz-ai11-source.tgz
          retention-days: 1

name: Export source snapshot

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'feat/providers-drizzle-production-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=node_modules --exclude=dist --exclude=data --exclude=workspace -czf /tmp/moataz-ai11-source.tar.gz .
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: moataz-ai11-source
          path: /tmp/moataz-ai11-source.tar.gz
          retention-days: 1

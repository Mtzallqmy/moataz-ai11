name: Phase 1-2 architecture audit

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  audit:
    if: github.head_ref == 'feat/providers-drizzle-phase12'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Generate architecture inventory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .audit
          {
            echo '# File tree'
            find . -path './.git' -prune -o -type f -print | sort
            echo
            echo '# Database imports and SQL sites'
            grep -RInE "from './db\.js'|from \"\./db\.js\"|\b(query|get|run|transaction)\s*\(" server/src --include='*.ts' || true
            echo
            echo '# Provider and LLM files'
            grep -RInE "providerCatalog|providerDefinition|normalizeBaseUrl|resolveProviderBaseUrl|listProviderModels|diagnoseProviderConnection|completeAgentStep|stream" server/src client/src --include='*.ts' --include='*.tsx' || true
            echo
            echo '# Schema and migration references'
            grep -RInE "CREATE TABLE|ALTER TABLE|schema_migrations|drizzle|better-sqlite3|new Pool|DATABASE_" . --exclude-dir=.git --exclude=package-lock.json || true
            echo
            echo '# Route inventory'
            grep -RInE "app\.(get|post|patch|put|delete)\(" server/src --include='*.ts' || true
            echo
            echo '# Test files'
            find . -type f \( -name '*.test.ts' -o -name '*.integration.test.ts' -o -path '*/tests/*' \) | sort
          } > .audit/phase12-inventory.txt
      - name: Commit audit inventory
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .audit/phase12-inventory.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: capture phase 1-2 architecture inventory'
          git push origin HEAD:${{ github.head_ref }}

name: Apply v1.5 production stabilization

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/provider-session-attachments-v1.5'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply reviewed transformations
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap/v15 ]; then
            echo 'Transformations already applied.'
            exit 0
          fi
          if [ -s .bootstrap/v15/last-error.txt ]; then
            echo 'A transformation error is already recorded for review.'
            exit 0
          fi
          set +e
          output="$(python3 .bootstrap/v15/apply.py 2>&1)"
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            printf '%s\n' "$output" > .bootstrap/v15/last-error.txt
            echo 'Transformation failed; diagnostic file will be committed.'
            exit 0
          fi
          python3 .bootstrap/v15/client.py
          rm -rf .bootstrap/v15
          rmdir .bootstrap 2>/dev/null || true
          rm -f .github/workflows/apply-v1.5.yml

      - name: Commit implementation or diagnostics
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: apply or diagnose v1.5 transformations'
          git push origin HEAD:${{ github.head_ref }}

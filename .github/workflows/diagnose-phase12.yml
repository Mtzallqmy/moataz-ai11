name: Capture phase 1-2 diagnostics

on:
  push:
    branches: [feat/provider-registry-drizzle-v2]
    paths:
      - '.audit/diagnose-trigger.txt'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/provider-registry-drizzle-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Run diagnostics
        shell: bash
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: 'false'
        run: |
          set +e
          mkdir -p .audit
          : > .audit/phase12-diagnostics.txt
          echo '===== npm ci =====' >> .audit/phase12-diagnostics.txt
          npm ci --include=dev --no-audit --no-fund >> .audit/phase12-diagnostics.txt 2>&1
          echo "exit=$?" >> .audit/phase12-diagnostics.txt
          echo '===== lint =====' >> .audit/phase12-diagnostics.txt
          npm run lint >> .audit/phase12-diagnostics.txt 2>&1
          echo "exit=$?" >> .audit/phase12-diagnostics.txt
          echo '===== typecheck =====' >> .audit/phase12-diagnostics.txt
          npm run typecheck >> .audit/phase12-diagnostics.txt 2>&1
          echo "exit=$?" >> .audit/phase12-diagnostics.txt
      - name: Commit diagnostics
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .audit/phase12-diagnostics.txt
          git commit -m 'chore: capture phase 1-2 lint and type diagnostics'
          git push origin HEAD:feat/provider-registry-drizzle-v2

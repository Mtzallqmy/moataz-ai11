name: Generate repository inspection snapshot

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  snapshot:
    if: github.head_ref == 'feat/providers-drizzle-production-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate tree and relevant source snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .analysis
          find . \
            -path './.git' -prune -o \
            -path './node_modules' -prune -o \
            -path './dist' -prune -o \
            -path './data' -prune -o \
            -path './workspace' -prune -o \
            -type f -print \
            | sed 's#^./##' | sort > .analysis/tree.txt

          : > .analysis/relevant-files.txt
          while IFS= read -r file; do
            case "$file" in
              server/src/*.ts|server/src/**/*.ts|server/test/*.ts|client/src/*.ts|client/src/*.tsx|client/src/**/*.ts|client/src/**/*.tsx|client/src/**/*.css|*.json|*.ts|*.md|Dockerfile|railway.json|.env.example|.github/workflows/*.yml|.github/workflows/*.yaml)
                {
                  printf '\n===== FILE: %s =====\n' "$file"
                  cat "$file"
                  printf '\n===== END FILE: %s =====\n' "$file"
                } >> .analysis/relevant-files.txt
                ;;
            esac
          done < .analysis/tree.txt

      - name: Commit snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .analysis
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'chore: generate repository inspection snapshot'
          git push origin HEAD:${{ github.head_ref }}

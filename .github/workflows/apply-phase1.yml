name: Apply provider phase 1

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/providers-drizzle-production-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Retrieve and diagnose reviewed provider patch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .analysis
          : > /tmp/phase1.double.b64
          : > .analysis/phase1-blob-diagnostics.txt
          index=0
          for sha in \
            ec14c37da6621f568d0a786191ff26f810c78fe6 \
            31539dc2323c7d89dda02cd8ad2caba9514341c8 \
            034e6d50730c05fe258eacb2db1a9f3a078bd794 \
            59ac510a4578286191dac08f9f99c2654e6f0a78 \
            b1c8d86d8c316ad96579cb7de5a8fb3e06ef0c76 \
            3e04b513d37ec5a9212c15fa76b0dd18a267ffc9 \
            aeb8c9e0de594ecf04e914abc4196b063de5c388 \
            f009067c25bcd39f3d93eb1885d5ec7b9d293ac4
          do
            file="/tmp/chunk-${index}"
            gh api "repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" --jq .content \
              | tr -d '\n' \
              | base64 -d > "${file}"
            printf '%s %s %s\n' "${index}" "$(wc -c < "${file}")" "$(sha256sum "${file}" | cut -d' ' -f1)" >> .analysis/phase1-blob-diagnostics.txt
            cat "${file}" >> /tmp/phase1.double.b64
            index=$((index + 1))
          done
          printf 'combined %s %s\n' "$(wc -c < /tmp/phase1.double.b64)" "$(sha256sum /tmp/phase1.double.b64 | cut -d' ' -f1)" >> .analysis/phase1-blob-diagnostics.txt

      - name: Commit diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .analysis/phase1-blob-diagnostics.txt
          git commit -m 'chore: record provider patch blob diagnostics'
          git pull --rebase origin ${{ github.head_ref }}
          git push origin HEAD:${{ github.head_ref }}

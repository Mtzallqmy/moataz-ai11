name: Apply provider phase 1

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  apply:
    if: github.head_ref == 'feat/providers-drizzle-production-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Diagnose payload retrieval
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .analysis
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/4947124120" --jq .body > /tmp/body.txt
          tail -n +2 /tmp/body.txt | tr -d '\n' > /tmp/comment.payload
          dd if=/tmp/comment.payload of=/tmp/prefix bs=1 count=8000 status=none
          : > /tmp/combined
          cat /tmp/prefix >> /tmp/combined
          for sha in \
            034e6d50730c05fe258eacb2db1a9f3a078bd794 \
            59ac510a4578286191dac08f9f99c2654e6f0a78 \
            b1c8d86d8c316ad96579cb7de5a8fb3e06ef0c76 \
            3e04b513d37ec5a9212c15fa76b0dd18a267ffc9 \
            aeb8c9e0de594ecf04e914abc4196b063de5c388 \
            f009067c25bcd39f3d93eb1885d5ec7b9d293ac4
          do
            gh api "repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" --jq .content | tr -d '\n' | base64 -d >> /tmp/combined
          done
          {
            echo "body-bytes $(wc -c < /tmp/body.txt)"
            echo "payload-bytes $(wc -c < /tmp/comment.payload)"
            echo "prefix-bytes $(wc -c < /tmp/prefix)"
            echo "prefix-sha $(sha256sum /tmp/prefix | cut -d' ' -f1)"
            echo "combined-bytes $(wc -c < /tmp/combined)"
            echo "combined-sha $(sha256sum /tmp/combined | cut -d' ' -f1)"
          } > .analysis/phase1-prefix-diagnostics.txt
      - name: Commit diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .analysis/phase1-prefix-diagnostics.txt
          git commit -m 'chore: record provider patch prefix diagnostics'
          git pull --rebase origin ${{ github.head_ref }}
          git push origin HEAD:${{ github.head_ref }}

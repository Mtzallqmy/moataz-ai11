name: Verify production build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify production structure
        shell: bash
        run: |
          set -euo pipefail
          test -f package.json
          test -f package-lock.json
          test -f Dockerfile
          test -f railway.json
          test -f server/src/index.ts
          test -f server/src/config.ts
          test -f server/src/db.ts
          test -f client/src/main.tsx
          test -f scripts/ensure-runtime-dirs.mjs
          test ! -e .bootstrap
          test ! -e .github/workflows/apply-phase2-deps.yml
          test ! -e drizzle.config.ts
          test ! -e drizzle
          test ! -e server/src/database

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: npm ci --include=dev --no-audit --no-fund

      - name: Prepare runtime directories
        run: node scripts/ensure-runtime-dirs.mjs

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build production Docker image
        run: docker build -t moataz-ai:production .

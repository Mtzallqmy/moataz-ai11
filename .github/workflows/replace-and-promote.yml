name: Replace, validate and promote production

on:
  push:
    branches:
      - agent/production-replacement-upload
    paths:
      - ".github/workflows/replace-and-promote.yml"

permissions:
  contents: write

concurrency:
  group: replace-production-repository
  cancel-in-progress: false

jobs:
  replace-validate-promote:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout replacement branch
        uses: actions/checkout@v4
        with:
          ref: agent/production-replacement-upload
          fetch-depth: 0

      - name: Assemble uploaded production source when needed
        shell: bash
        run: |
          set -euo pipefail

          if [[ -d .bootstrap ]]; then
            grep -h -v '^#' .bootstrap/source.part-* | tr -d '\n' | base64 --decode > /tmp/moataz-source.tar.xz
            xz -dc --single-stream /tmp/moataz-source.tar.xz > /tmp/moataz-source.tar 2>/tmp/xz-warning.log || true
            test -s /tmp/moataz-source.tar

            mkdir -p /tmp/moataz-source
            last_member="$(tar -tf /tmp/moataz-source.tar --ignore-zeros 2>/dev/null | tail -n 1 || true)"
            tar -xf /tmp/moataz-source.tar -C /tmp/moataz-source --ignore-zeros 2>/tmp/tar-warning.log || true

            # Do not overlay a member whose body may have been cut at the transport boundary.
            if [[ -n "$last_member" && -f "/tmp/moataz-source/$last_member" ]]; then
              rm -f "/tmp/moataz-source/$last_member"
            fi

            shopt -s dotglob nullglob
            cp -a /tmp/moataz-source/. .
          fi

          rm -f .github/workflows/apply-phase2-deps.yml
          rm -f drizzle.config.ts
          rm -f server/src/db/client.ts server/src/db/schema.ts server/src/db/migrate.ts

      - name: Verify required project structure
        shell: bash
        run: |
          set -euo pipefail
          test -f package.json
          test -f Dockerfile
          test -f railway.json
          test -f server/src/index.ts
          test -f client/src/main.tsx
          test -f scripts/ensure-runtime-dirs.mjs
          node -e "const p=require('./package.json'); for (const s of ['lint','typecheck','test','build']) if(!p.scripts?.[s]) process.exit(1)"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate production lockfile
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install all validation dependencies
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: npm ci --include=dev --no-audit --no-fund

      - name: Prepare runtime directories
        run: node scripts/ensure-runtime-dirs.mjs

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run complete test suite
        run: npm test

      - name: Build frontend and backend
        run: npm run build

      - name: Build Railway production image
        run: docker build -t moataz-ai:production .

      - name: Commit clean source and promote main
        shell: bash
        run: |
          set -euo pipefail

          rm -rf node_modules dist data workspace .bootstrap
          rm -f .github/workflows/replace-repository.yml
          rm -f .github/workflows/replace-and-promote.yml
          rm -f .github/workflows/promote-production.yml
          rm -f .github/workflows/apply-phase2-deps.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check

          if ! git diff --cached --quiet; then
            git commit -m "fix: replace repository with Railway production release"
          fi

          git push origin HEAD:agent/production-replacement-upload
          git fetch origin main
          git merge-base --is-ancestor origin/main HEAD
          git push origin HEAD:main

name: Sanitize provider endpoint diagnostics
on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened, ready_for_review]
permissions:
  contents: write
jobs:
  apply:
    if: github.head_ref == 'feat/providers-drizzle-phase12'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Sanitize endpoint diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('server/src/providers/http.ts')
          text = path.read_text()
          marker = "function requestId(headers: Headers): string | undefined {"
          helper = """function safeEndpoint(value: string): string {
            try {
              const url = new URL(value);
              url.username = '';
              url.password = '';
              url.search = '';
              url.hash = '';
              return url.toString().replace(/\\/$/, '');
            } catch {
              return '[invalid-provider-url]';
            }
          }

          function requestId(headers: Headers): string | undefined {"""
          if 'function safeEndpoint(value: string)' not in text:
              if marker not in text:
                  raise SystemExit('requestId marker missing')
              text = text.replace(marker, helper, 1)
          text = text.replace("const endpoint = response.url || input.url;", "const endpoint = safeEndpoint(response.url || input.url);")
          text = text.replace("endpoint: input.url,", "endpoint: safeEndpoint(input.url),")
          old = "throw new ProviderHttpError(error instanceof Error ? error.message : String(error), {"
          new = "const rawMessage = error instanceof Error ? error.message : String(error);\n    const message = rawMessage.split(input.url).join(safeEndpoint(input.url));\n    throw new ProviderHttpError(message, {"
          if old in text:
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          rm -f .github/workflows/sanitize-provider-endpoints.yml
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: sanitize provider endpoint diagnostics'
          git push origin HEAD:${{ github.head_ref }}

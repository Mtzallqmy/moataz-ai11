name: Apply OmniRoute integration

on:
  push:
    branches:
      - agent/integrate-omniroute-gateway
    paths:
      - '.omniroute-release/**'
      - '.github/workflows/apply-omniroute-integration.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .omniroute-release/part-* | base64 --decode > /tmp/omniroute.patch.xz
          echo "eaee45a1af4acf5eac2470ee07922c4401d41d056d51f40186c90a7504967889  /tmp/omniroute.patch.xz" | sha256sum --check -
          xz --decompress --stdout /tmp/omniroute.patch.xz > /tmp/omniroute.patch
          git apply --check /tmp/omniroute.patch
          git apply /tmp/omniroute.patch

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck -- --pretty false

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Build application
        run: npm run build

      - name: Build production Docker image
        run: docker build --tag moataz-ai:omniroute-test .

      - name: Commit verified integration
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .omniroute-release
          rm -f .github/workflows/apply-omniroute-integration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: integrate OmniRoute as optional gateway provider"
          git push origin HEAD:agent/integrate-omniroute-gateway

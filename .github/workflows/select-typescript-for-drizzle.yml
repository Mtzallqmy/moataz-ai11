name: Select TypeScript for Drizzle
on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened, ready_for_review]
permissions:
  contents: write
jobs:
  select:
    if: github.head_ref == 'feat/providers-drizzle-phase12'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=dev --no-audit --no-fund
      - name: Select compiler without library errors
        shell: bash
        run: |
          set -euo pipefail
          selected=''
          for version in 5.5.4 5.6.3 5.7.2 5.8.3; do
            npm install --no-save --package-lock=false "typescript@$version" mysql2 >/dev/null 2>&1
            set +e
            ./node_modules/.bin/tsc -p server/tsconfig.json --noEmit > /tmp/typecheck.txt 2>&1
            set -e
            if ! grep -q '^node_modules/drizzle-orm/' /tmp/typecheck.txt; then
              selected="$version"
              break
            fi
          done
          if [ -z "$selected" ]; then
            echo 'No tested TypeScript version type-checks Drizzle declarations without skipLibCheck.'
            cat /tmp/typecheck.txt
            exit 1
          fi
          npm install --save-dev "typescript@$selected" mysql2
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json')); p.devDependencies.typescript='$selected'; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n')"
          rm -f .github/workflows/select-typescript-for-drizzle.yml
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json .github/workflows/select-typescript-for-drizzle.yml
          git commit -m 'build: select strict TypeScript compatibility for Drizzle'
          git push origin HEAD:${{ github.head_ref }}

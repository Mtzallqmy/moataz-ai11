name: Normalize npm lockfile

on:
  push:
    branches: [fix/railway-build]
    paths:
      - '.github/workflows/normalize-lockfile.yml'

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/railway-build

      - name: Replace internal registry URLs
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'package-lock.json';
          const internalPrefixes = [
            'https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/',
            'https://packages.applied-caas-gateway.internal.api.openai.org/artifactory/api/npm/npm-public/'
          ];

          const document = JSON.parse(fs.readFileSync(path, 'utf8'));
          let replacements = 0;

          function visit(value) {
            if (Array.isArray(value)) {
              return value.map(visit);
            }
            if (value && typeof value === 'object') {
              for (const [key, child] of Object.entries(value)) {
                value[key] = visit(child);
              }
              return value;
            }
            if (typeof value === 'string') {
              for (const prefix of internalPrefixes) {
                if (value.startsWith(prefix)) {
                  replacements += 1;
                  return 'https://registry.npmjs.org/' + value.slice(prefix.length);
                }
              }
            }
            return value;
          }

          visit(document);
          fs.writeFileSync(path, JSON.stringify(document, null, 2) + '\n');
          console.log(`Replaced ${replacements} internal registry URL(s).`);
          if (replacements === 0) {
            console.log('The lockfile was already normalized.');
          }
          NODE

          if grep -R "applied-caas-gateway\|artifactory/api/npm" package-lock.json; then
            echo "Internal registry URLs remain in package-lock.json"
            exit 1
          fi

      - name: Commit normalized lockfile
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "No lockfile changes required."
            exit 0
          fi
          git commit -m "fix: normalize npm lockfile to public registry"
          git push origin HEAD:fix/railway-build
